name: Release Binaries

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Release
        run: cargo build --release
      
      - name: Strip Binary
        run: strip target/release/dsaengine
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/dsaengine

  build-macos:
    name: Build macOS (x86_64 + ARM64)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install ARM64 target
        run: rustup target add aarch64-apple-darwin
      
      - name: Build Release x86_64
        run: cargo build --release --target x86_64-apple-darwin
      
      - name: Build Release ARM64
        run: cargo build --release --target aarch64-apple-darwin
      
      - name: Create Universal Binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/dsaengine \
            target/aarch64-apple-darwin/release/dsaengine \
            -output target/release/dsaengine-universal
      
      - name: Upload x86_64
        uses: softprops/action-gh-release@v1
        with:
          files: target/x86_64-apple-darwin/release/dsaengine|dsaengine-macos-x86_64
      
      - name: Upload ARM64
        uses: softprops/action-gh-release@v1
        with:
          files: target/aarch64-apple-darwin/release/dsaengine|dsaengine-macos-arm64

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Release
        run: cargo build --release
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/dsaengine.exe
